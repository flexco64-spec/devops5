<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심플 테트리스 - 시작 버튼 포함</title>
    <style>
        body { background: #202028; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { position: relative; border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; background-color: #000; }
        .ui { margin-top: 20px; text-align: center; }
        .score { font-size: 28px; color: #ffeb3b; margin-bottom: 10px; }
        
        /* 시작 버튼 스타일 */
        #start-btn {
            padding: 10px 30px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #start-btn:hover { background-color: #45a049; }
        #start-btn:disabled { background-color: #888; cursor: not-allowed; }
        
        .controls-info { font-size: 0.9em; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>TETRIS</h1>
    
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <div class="ui">
        <div class="score" id="score">Score: 0</div>
        <button id="start-btn">게임 시작</button>
        <div class="controls-info">
            방향키: 이동(← →), 회전(↑), 내리기(↓)
        </div>
    </div>

    if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
    if (type === 'O') return [[2, 2], [2, 2]];
    if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
    if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
    if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
    if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
    if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
}

function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
}

    drawMatrix(player.matrix, player.pos);
}
